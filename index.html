<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://skillicons.dev" />
    <link rel="preconnect" href="https://ghchart.rshah.org" />

    <!-- Default title + description (overridden per-route via @unhead/vue) -->
    <title>Ricki Friadi — Fullstack Developer</title>
    <meta
      name="description"
      content="Portfolio of Ricki Friadi, a Fullstack Developer specializing in Vue 3, TypeScript, and NestJS with 3+ years building scalable systems."
    />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ricki Friadi" />
    <meta property="og:title" content="Ricki Friadi — Fullstack Developer" />
    <meta
      property="og:description"
      content="Portfolio of Ricki Friadi, a Fullstack Developer specializing in Vue 3, TypeScript, and NestJS with 3+ years building scalable systems."
    />
    <meta property="og:url" content="https://rickifriadi.dev/" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Ricki Friadi — Fullstack Developer" />
    <meta
      name="twitter:description"
      content="Portfolio of Ricki Friadi, a Fullstack Developer specializing in Vue 3, TypeScript, and NestJS."
    />

    <!-- Canonical (overridden per-route) -->
    <link rel="canonical" href="https://rickifriadi.dev/" />

    <!-- JSON-LD: Person schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ricki Friadi",
        "url": "https://rickifriadi.dev",
        "jobTitle": "Fullstack Developer",
        "worksFor": {
          "@type": "Organization",
          "name": "PT. Pegadaian"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Jakarta",
          "addressCountry": "ID"
        },
        "sameAs": ["https://www.linkedin.com/in/rickifriadi", "https://github.com/rickyfrdy"],
        "knowsAbout": ["Vue.js", "TypeScript", "NestJS", "Node.js", "Microservices", "PostgreSQL"]
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
